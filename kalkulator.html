<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Google Ads Budsjett Kalkulator for Rørleggere i Stavanger</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #ffffff;
            color: #333;
            line-height: 1.6;
            padding: 20px;
        }
        
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: #ffffff;
            border-radius: 12px;
            box-shadow: 0 8px 32px rgba(27, 79, 216, 0.1);
            overflow: hidden;
        }
        
        .header {
            background: linear-gradient(135deg, #1B4FD8, #2563eb);
            color: white;
            padding: 40px 30px;
            text-align: center;
        }
        
        .header h1 {
            font-size: 28px;
            margin-bottom: 10px;
            font-weight: 600;
        }
        
        .header p {
            font-size: 16px;
            opacity: 0.9;
        }
        
        .calculator-body {
            padding: 40px 30px;
        }
        
        .input-group {
            margin-bottom: 25px;
            padding: 20px;
            background: #f8fafc;
            border-radius: 8px;
            border-left: 4px solid #1B4FD8;
        }
        
        .input-group label {
            display: block;
            font-weight: 600;
            margin-bottom: 8px;
            color: #1B4FD8;
        }
        
        .input-group input, .input-group select {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e2e8f0;
            border-radius: 6px;
            font-size: 16px;
            transition: border-color 0.3s ease;
        }
        
        .input-group input:focus, .input-group select:focus {
            outline: none;
            border-color: #1B4FD8;
            box-shadow: 0 0 0 3px rgba(27, 79, 216, 0.1);
        }
        
        .input-help {
            font-size: 14px;
            color: #64748b;
            margin-top: 5px;
        }
        
        .calculate-btn {
            background: #1B4FD8;
            color: white;
            border: none;
            padding: 16px 32px;
            font-size: 18px;
            font-weight: 600;
            border-radius: 8px;
            cursor: pointer;
            width: 100%;
            margin: 20px 0;
            transition: background-color 0.3s ease;
        }
        
        .calculate-btn:hover {
            background: #1e40af;
        }
        
        .results {
            background: linear-gradient(135deg, #f0f7ff, #e0f2fe);
            border: 2px solid #1B4FD8;
            border-radius: 12px;
            padding: 30px;
            margin-top: 30px;
            display: none;
        }
        
        .results.show {
            display: block;
            animation: slideIn 0.5s ease-out;
        }
        
        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .result-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid rgba(27, 79, 216, 0.2);
        }
        
        .result-item:last-child {
            border-bottom: none;
            font-weight: 700;
            font-size: 18px;
            color: #1B4FD8;
        }
        
        .result-label {
            font-weight: 600;
        }
        
        .result-value {
            font-weight: 700;
            color: #1B4FD8;
        }
        
        .cta-section {
            background: #1B4FD8;
            color: white;
            padding: 40px 30px;
            text-align: center;
            margin-top: 40px;
        }
        
        .cta-section h3 {
            font-size: 24px;
            margin-bottom: 15px;
        }
        
        .cta-section p {
            font-size: 16px;
            margin-bottom: 25px;
            opacity: 0.9;
        }
        
        .cta-btn {
            background: white;
            color: #1B4FD8;
            border: none;
            padding: 18px 36px;
            font-size: 18px;
            font-weight: 700;
            border-radius: 8px;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }
        
        .cta-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(0,0,0,0.2);
        }
        
        .tips {
            background: #f1f5f9;
            padding: 25px;
            border-radius: 8px;
            margin-top: 30px;
        }
        
        .tips h4 {
            color: #1B4FD8;
            margin-bottom: 15px;
            font-size: 18px;
        }
        
        .tips ul {
            list-style-type: none;
            padding-left: 0;
        }
        
        .tips li {
            padding: 8px 0;
            border-left: 3px solid #1B4FD8;
            padding-left: 15px;
            margin-bottom: 8px;
        }
        
        @media (max-width: 768px) {
            body {
                padding: 10px;
            }
            
            .header {
                padding: 30px 20px;
            }
            
            .header h1 {
                font-size: 24px;
            }
            
            .calculator-body, .cta-section {
                padding: 30px 20px;
            }
            
            .input-group {
                padding: 15px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Google Ads Budsjett Kalkulator</h1>
            <p>Beregn optimal månedsbudsjett for å få flere akutte rørleggeroppdrag i Stavanger-området</p>
        </div>
        
        <div class="calculator-body">
            <div class="input-group">
                <label for="serviceType">Type tjeneste du tilbyr:</label>
                <select id="serviceType">
