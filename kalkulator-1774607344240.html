<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Google Ads Kostnadskalkulator for Rørleggere</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #ffffff;
            color: #333;
            line-height: 1.6;
        }
        
        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
        }
        
        .header {
            text-align: center;
            margin-bottom: 30px;
            padding: 30px 0;
            background: linear-gradient(135deg, #1B4FD8, #3366FF);
            color: white;
            border-radius: 15px;
        }
        
        .header h1 {
            font-size: 2.2em;
            margin-bottom: 10px;
        }
        
        .header p {
            font-size: 1.1em;
            opacity: 0.9;
        }
        
        .calculator-form {
            background: #f8f9fa;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 5px 15px rgba(27, 79, 216, 0.1);
            margin-bottom: 30px;
        }
        
        .form-group {
            margin-bottom: 25px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #1B4FD8;
        }
        
        .form-group input, .form-group select {
            width: 100%;
            padding: 12px;
            border: 2px solid #e1e5e9;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.3s;
        }
        
        .form-group input:focus, .form-group select:focus {
            outline: none;
            border-color: #1B4FD8;
        }
        
        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }
        
        .calculate-btn {
            background: #1B4FD8;
            color: white;
            padding: 15px 30px;
            border: none;
            border-radius: 8px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            transition: background-color 0.3s;
            margin-top: 20px;
        }
        
        .calculate-btn:hover {
            background: #0f3bb8;
        }
        
        .results {
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            margin-bottom: 30px;
            border-left: 5px solid #1B4FD8;
            display: none;
        }
        
        .results.show {
            display: block;
        }
        
        .result-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 0;
            border-bottom: 1px solid #eee;
        }
        
        .result-item:last-child {
            border-bottom: none;
            font-weight: 700;
            font-size: 1.2em;
            color: #1B4FD8;
        }
        
        .result-label {
            font-weight: 600;
        }
        
        .result-value {
            font-size: 1.1em;
            color: #1B4FD8;
            font-weight: 600;
        }
        
        .cta-section {
            text-align: center;
            background: linear-gradient(135deg, #1B4FD8, #3366FF);
            color: white;
            padding: 40px;
            border-radius: 15px;
            margin-top: 30px;
        }
        
        .cta-section h2 {
            margin-bottom: 15px;
            font-size: 1.8em;
        }
        
        .cta-section p {
            margin-bottom: 25px;
            font-size: 1.1em;
            opacity: 0.9;
        }
        
        .cta-btn {
            background: white;
            color: #1B4FD8;
            padding: 18px 40px;
            border: none;
            border-radius: 50px;
            font-size: 18px;
            font-weight: 700;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
            transition: all 0.3s;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }
        
        .cta-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(0,0,0,0.3);
        }
        
        .tips {
            background: #f0f7ff;
            padding: 25px;
            border-radius: 10px;
            margin-top: 20px;
            border-left: 4px solid #1B4FD8;
        }
        
        .tips h3 {
            color: #1B4FD8;
            margin-bottom: 15px;
        }
        
        .tips ul {
            list-style: none;
            padding-left: 0;
        }
        
        .tips li {
            padding: 5px 0;
            padding-left: 20px;
            position: relative;
        }
        
        .tips li:before {
            content: "✓";
            color: #1B4FD8;
            font-weight: bold;
            position: absolute;
            left: 0;
        }
        
        @media (max-width: 768px) {
            .form-row {
                grid-template-columns: 1fr;
            }
            
            .header h1 {
                font-size: 1.8em;
            }
            
            .container {
                padding: 15px;
            }
        }
    </style>
</head>
<body>

        <div class="header">
            <h1>Google Ads Kostnadskalkulator</h1>
            <p>Beregn månedlige kostnader for Google Ads kampanjer for rørleggere i Norge</p>
        </div>
