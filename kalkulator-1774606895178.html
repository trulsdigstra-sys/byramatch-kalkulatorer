<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SEO-budsjett kalkulator for rørleggere i Stavanger</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #ffffff;
            color: #333;
            line-height: 1.6;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
            padding: 30px 0;
            background: linear-gradient(135deg, #1B4FD8, #2B5FE8);
            color: white;
            border-radius: 15px;
        }

        h1 {
            font-size: 2.2em;
            margin-bottom: 10px;
        }

        .subtitle {
            font-size: 1.1em;
            opacity: 0.9;
        }

        .calculator-card {
            background: white;
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(27, 79, 216, 0.1);
            border: 2px solid #f0f0f0;
            margin-bottom: 30px;
        }

        .form-group {
            margin-bottom: 25px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #1B4FD8;
        }

        select, input[type="number"] {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.3s ease;
        }

        select:focus, input[type="number"]:focus {
            outline: none;
            border-color: #1B4FD8;
            box-shadow: 0 0 0 3px rgba(27, 79, 216, 0.1);
        }

        .checkbox-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-top: 10px;
        }

        .checkbox-item {
            display: flex;
            align-items: center;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .checkbox-item:hover {
            border-color: #1B4FD8;
            background-color: rgba(27, 79, 216, 0.05);
        }

        .checkbox-item.selected {
            border-color: #1B4FD8;
            background-color: rgba(27, 79, 216, 0.1);
        }

        .checkbox-item input[type="checkbox"] {
            margin-right: 10px;
            transform: scale(1.2);
        }

        .calculate-btn {
            width: 100%;
            padding: 15px 30px;
            background: linear-gradient(135deg, #1B4FD8, #2B5FE8);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.3s ease;
        }

        .calculate-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(27, 79, 216, 0.3);
        }

        .results {
            margin-top: 30px;
            padding: 25px;
            background: linear-gradient(135deg, rgba(27, 79, 216, 0.05), rgba(27, 79, 216, 0.1));
            border-radius: 15px;
            border-left: 5px solid #1B4FD8;
            display: none;
        }

        .results h3 {
            color: #1B4FD8;
            margin-bottom: 20px;
            font-size: 1.5em;
        }

        .result-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid rgba(27, 79, 216, 0.2);
        }

        .result-item:last-child {
            border-bottom: none;
            font-weight: bold;
            font-size: 1.2em;
            color: #1B4FD8;
        }

        .price {
            font-weight: bold;
            color: #1B4FD8;
        }

        .cta-section {
            text-align: center;
            margin-top: 40px;
            padding: 30px;
            background: linear-gradient(135deg, #1B4FD8, #2B5FE8);
            border-radius: 15px;
            color: white;
        }

        .cta-btn {
            display: inline-block;
            padding: 15px 40px;
            background: white;
            color: #1B4FD8;
            text-decoration: none;
            border-radius: 10px;
            font-weight: bold;
            font-size: 18px;
            margin-top: 15px;
            transition: all 0.3s ease;
        }

        .cta-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
        }

        .recommendation {
            margin-top: 20px;
            padding: 20px;
            background: rgba(27, 79, 216, 0.05);
            border-radius: 10px;
            border-left: 4px solid #1B4FD8;
        }

        @media (max-width: 600px) {
            .checkbox-group {
                grid-template-columns: 1fr;
            }
            
            h1 {
                font-size: 1.8em;
            }
            
            .container {
                padding: 15px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>SEO-budsjett kalkulator</h1>
            <p class="subtitle">Beregn kostnader for SEO-satsing som rørlegger i Stavanger</p>
        </div>

        <div class="calculator-card">
            <form id="seoCalculator">
                <div class="form-group">
                    <label for="businessSize">Bedriftsstørrelse</label>
                    <select id="businessSize">
                        <option value="small">Liten bedrift (1-3 ansatte)</option>
                        <option value="medium">Middels bedrift (4-10 ansatte)</option>
                        <option value="large">Stor bedrift (10+ ansatte)</option>
                    </select>
                </div>

                <div class="form-group">
                    <label
